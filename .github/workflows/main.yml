name: Publish to npm
on:
  # 手动触发
  workflow_dispatch:
  # 推送到 main 分支时自动触发（如需启用，取消下面的注释）
  # push:
  #   branches:
  #     - main

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance 需要
    steps:
      - name: Clone repository
        uses: actions/checkout@v6 # 克隆代码

      - name: Install Node.js
        uses: actions/setup-node@v6 # 安装 Node.js
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # 调用 github 填写的 NPM_TOKEN
